name: Build Windows installers

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-installers:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set release version
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}".Trim()
          if ($tag.StartsWith('v')) {
            $tag = $tag.Substring(1)
          }

          $version = $tag
          if ($version -match '^(?<core>\d+\.\d+\.\d+)(?<suffix>[A-Za-z]+)(?<num>\d+)$') {
            $version = "$($Matches.core)-$($Matches.suffix.ToLower())$($Matches.num)"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$') {
            throw "Release tag '$tag' could not be converted to a valid package version."
          }

          npm version --no-git-tag-version --allow-same-version $version

      - name: Install dependencies
        run: npm install --cache .npm-cache
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Build installers
        run: npm run make -- --arch=${{ matrix.arch }}
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Show installer output
        shell: pwsh
        run: |
          if (Test-Path out) {
            Get-ChildItem -Path out -Recurse | Select-Object FullName, Length
          } else {
            Write-Host 'No out directory was created.'
          }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: indicoink-windows-installers-${{ matrix.arch }}
          path: out/make/squirrel.windows/${{ matrix.arch }}/*
          if-no-files-found: error

  publish-release-assets:
    runs-on: windows-latest
    needs: build-windows-installers
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: indicoink-windows-installers-*
          path: release-assets

      - name: Package installers for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/published | Out-Null
          $tag = "${{ github.event.release.tag_name }}"

          Get-ChildItem -Path release-assets -Directory |
            Where-Object { $_.Name -like 'indicoink-windows-installers-*' } |
            ForEach-Object {
              $arch = $_.Name.Replace('indicoink-windows-installers-', '')
              $setupExe = Get-ChildItem -Path $_.FullName -Filter "*.exe" -File | Select-Object -First 1
              if (-not $setupExe) {
                throw "Missing setup executable in $($_.FullName)"
              }
              Copy-Item -Path $setupExe.FullName -Destination (Join-Path 'release-assets/published' "IndicoInk-$tag-Setup-$arch.exe") -Force
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/published/*.exe
