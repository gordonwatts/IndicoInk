name: Build Windows installers

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-installers:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --cache .npm-cache
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Build installers
        run: npm run make -- --platform=win32 --arch=${{ matrix.arch }}
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: indicoink-windows-installers-${{ matrix.arch }}
          path: out/make/squirrel.windows/${{ matrix.arch }}/*
          if-no-files-found: error

  publish-release-assets:
    runs-on: windows-latest
    needs: build-windows-installers
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: indicoink-windows-installers-*
          path: release-assets

      - name: Package installers for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/published | Out-Null
          $version = (Get-Content package.json | ConvertFrom-Json).version

          Get-ChildItem -Path release-assets -Directory |
            Where-Object { $_.Name -like 'indicoink-windows-installers-*' } |
            ForEach-Object {
              $arch = $_.Name.Replace('indicoink-windows-installers-', '')
              $zipPath = Join-Path 'release-assets/published' "IndicoInk-$version-win32-$arch-squirrel.zip"

              if (Test-Path $zipPath) {
                Remove-Item $zipPath -Force
              }

              Compress-Archive -Path (Join-Path $_.FullName '*') -DestinationPath $zipPath

              $setupExe = Get-ChildItem -Path $_.FullName -Filter "IndicoInk-Setup-$arch.exe" -File | Select-Object -First 1
              if (-not $setupExe) {
                throw "Missing IndicoInk-Setup-$arch.exe in $($_.FullName)"
              }
              Copy-Item -Path $setupExe.FullName -Destination (Join-Path 'release-assets/published' $setupExe.Name) -Force
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/published/*.exe
            release-assets/published/*.zip
