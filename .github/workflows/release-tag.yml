name: Build Windows installers

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-windows-installers:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --cache .npm-cache
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Build installers
        run: npm run make -- --arch=${{ matrix.arch }}
        env:
          ELECTRON_INSTALL_ARCH: ${{ matrix.arch }}
          npm_config_arch: ${{ matrix.arch }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: indicoink-windows-installers-${{ matrix.arch }}
          path: out/make/squirrel.windows/${{ matrix.arch }}/*

  publish-release-assets:
    runs-on: windows-latest
    needs: build-windows-installers
    permissions:
      contents: write

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: indicoink-windows-installers-*
          path: release-assets

      - name: Package installers for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/published | Out-Null

          Get-ChildItem -Path release-assets -Directory |
            Where-Object { $_.Name -like 'indicoink-windows-installers-*' } |
            ForEach-Object {
              $arch = $_.Name.Replace('indicoink-windows-installers-', '')
              $zipPath = Join-Path 'release-assets/published' "indicoink-windows-installers-$arch.zip"

              if (Test-Path $zipPath) {
                Remove-Item $zipPath -Force
              }

              Compress-Archive -Path (Join-Path $_.FullName '*') -DestinationPath $zipPath
            }

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/published/*.zip
